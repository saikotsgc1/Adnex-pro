<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AdNex PRO | Growth Engineering</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
      // Force dark mode
      document.documentElement.classList.add('dark');
    </script>
  </head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
    <script>
(function(){
  var b=document.createElement('div');
  b.id='nira-chat-bubble';
  b.style.cssText='position:fixed;bottom:20px;right:20px;width:60px;height:60px;border-radius:50%;background:#7c3aed;cursor:pointer;z-index:9999;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 15px rgba(124,58,237,.4)';
  b.innerHTML='<svg width="28" height="28" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>';
  var f=document.createElement('div');
  f.id='nira-chat-frame';
  f.style.cssText='position:fixed;bottom:90px;right:20px;width:380px;height:560px;max-width:calc(100vw - 40px);max-height:calc(100vh - 120px);border-radius:16px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3);z-index:9999;display:none';
  f.innerHTML='<iframe src="https://chatbot.adnexpro.com/chat" style="width:100%;height:100%;border:none"></iframe>';
  document.body.appendChild(b);
  document.body.appendChild(f);
  b.onclick=function(){
    var v=f.style.display==='none';
    f.style.display=v?'block':'none';
  };
})();
</script>
</body>
</html>
